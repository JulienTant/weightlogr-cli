version: "3"

vars:
  BINARY: weightlogr
  DIST: dist
  MISE: mise exec --

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - CGO_ENABLED=0 {{.MISE}} go build -o {{.DIST}}/{{.BINARY}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST}}/{{.BINARY}}"

  lint:
    desc: Run golangci-lint
    cmds:
      - "{{.MISE}} golangci-lint run ./..."

  fmt:
    desc: Format code with gofumpt
    cmds:
      - "{{.MISE}} gofumpt -w cmd/ internal/ main.go"

  test:
    desc: Run tests
    cmds:
      - "{{.MISE}} gotestsum --format testdox ./..."

  e2e:
    desc: Run e2e smoke tests
    cmds:
      - ./e2e-tests/smoke_test.sh

  check:
    desc: Run fmt, lint, test, and e2e
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: e2e

  release:snapshot:
    desc: Build a snapshot release (no publish)
    cmds:
      - "{{.MISE}} goreleaser release --snapshot --clean"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.DIST}}/
